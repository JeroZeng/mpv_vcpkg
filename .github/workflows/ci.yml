name: Build libmpv

on:
  pull_request:
  push:
    branches: [main, vcpkg]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: libmpv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    name: Build libmpv (macos-15 / ${{ matrix.arch }})
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
      MPV_TARGET_ARCH: ${{ matrix.arch }}
      VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_FORCE_SYSTEM_BINARIES: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            deployment_target: "13.0"
            vcpkg_triplet: arm64-osx-mp
          - arch: x86_64
            deployment_target: "13.0"
            vcpkg_triplet: x64-osx-mp
    steps:
      - uses: actions/checkout@v6

      - name: Show build environment
        run: |
          xcodebuild -version
          uname -m
          echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET"
          echo "MPV_TARGET_ARCH=$MPV_TARGET_ARCH"
          echo "VCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          set -euo pipefail
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install meson ninja
          FORMULAE=(pkgconf autoconf autoconf-archive automake libtool nasm)
          MISSING=()
          for f in "${FORMULAE[@]}"; do
            if ! brew list --formula "$f" >/dev/null 2>&1; then
              MISSING+=("$f")
            fi
          done
          if [ "${#MISSING[@]}" -gt 0 ]; then
            brew update
            brew install -q "${MISSING[@]}"
          fi

      - name: Preflight tool checks
        run: |
          set -euo pipefail
          for tool in nasm pkg-config meson ninja; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
          done
          nasm -v | head -n 1 || true
          pkg-config --version
          meson --version
          ninja --version

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            ~/Library/Caches/vcpkg/archives
          key: ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-${{ hashFiles('install-vcpkg-deps.sh', 'vcpkg-triplets/*.cmake', 'vcpkg-ports/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-

      - name: Bootstrap vcpkg
        run: |
          set -euo pipefail
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install vcpkg dependencies
        run: bash ./install-vcpkg-deps.sh

      - name: Download mpv source code
        run: bash ./download.sh

      - name: Build mpv library
        run: bash ./build-macos.sh

      - name: Prepare artifacts
        env:
          MPV_TARGET_ARCH: ${{ matrix.arch }}
          VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-macos-${{ matrix.arch }}"
          bash ./package-macos-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-macos-${{ github.run_id }}-${{ matrix.arch }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  linux-build:
    name: Build libmpv (${{ matrix.runner }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install apt dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git curl python3 meson ninja-build pkg-config patchelf \
            libfreetype-dev libfribidi-dev liblcms2-dev libluajit-5.1-dev \
            libass-dev libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            libpipewire-0.3-dev libpulse-dev \
            libxss-dev libxpresent-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libarchive-dev libbluray-dev libcdio-paranoia-dev libdvdnav-dev \
            librubberband-dev libzimg-dev libplacebo-dev libvulkan-dev

      - name: Show build environment
        run: |
          set -euo pipefail
          uname -a
          gcc --version
          meson --version
          pkg-config --version

      - name: Download mpv source code
        run: bash ./download.sh

      - name: Build mpv library
        run: bash ./build-linux.sh

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-linux-${{ matrix.arch }}"
          bash ./package-linux-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-linux-${{ github.run_id }}-${{ matrix.arch }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  mingw64-build:
    name: Build libmpv (windows-2022 / mingw64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-python
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-libass
            mingw-w64-x86_64-luajit
            mingw-w64-x86_64-uchardet
            mingw-w64-x86_64-libplacebo
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-libbluray
            mingw-w64-x86_64-libcdio-paranoia
            mingw-w64-x86_64-libdvdnav
            mingw-w64-x86_64-rubberband
            mingw-w64-x86_64-zimg
            mingw-w64-x86_64-vulkan-loader
            mingw-w64-x86_64-vulkan-headers

      - name: Show build environment
        shell: msys2 {0}
        run: |
          set -euo pipefail
          uname -a
          gcc --version
          meson --version
          pkg-config --version

      - name: Download mpv source code
        shell: msys2 {0}
        run: bash ./download.sh

      - name: Build mpv library
        shell: msys2 {0}
        run: bash ./build-mingw64.sh

      - name: Prepare artifacts
        shell: msys2 {0}
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-windows-mingw64-x86_64"
          bash ./package-mingw64-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-mingw64-${{ github.run_id }}-x86_64
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos-build, linux-build, mingw64-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.tar.gz.sha256
          generate_release_notes: true
